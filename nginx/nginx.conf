events {}

http {

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
    
    include /usr/local/nginx/conf/naxsi_core.rules;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        listen [::]:80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /etc/nginx/ssl/hypertube.crt;
        ssl_certificate_key /etc/nginx/ssl/hypertube.key;

        root /usr/local/nginx/html;
        index index.html;

        client_max_body_size 20M;
        client_body_buffer_size 512k;


        location /RequestDenied/ {
            proxy_pass http://hypertube_backend:8000/RequestDenied/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://hypertube_backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://hypertube_backend:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            include /usr/local/nginx/conf/naxsi.rules;
            try_files $uri /index.html;
        }
    }
}

