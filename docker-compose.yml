services:

  # NGINX Web server (and naxsi as WAF)
  # Also contains the frontend static files
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
      network: host
    container_name: nginx
    ports:
      - 80:80
      - 443:443
    env_file: .env
    depends_on:
     - react_dev
     - hypertube_backend
    networks:
      - hypertube-network
    restart: on-failure

  react_dev:
    build:
      context: ./app/frontend
      network: host
    container_name: react_dev
    env_file: .env
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    ports:
      - 5173:5173
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - hypertube-network
    restart: on-failure

  # Hypertube backend
  hypertube_backend:
    build:
      context: ./app/backend
      network: host
    container_name: hypertube_backend
    ports:
      - 8000:8000
      - 6881:6881/tcp
      - 6881:6881/udp
    env_file: .env
    volumes:
      - ./app/backend/app:/app
      - ./movie_data:/data/movies
      - subtitle_data:/data/subtitles
      - ./logs:/data/logs
    depends_on:
      - mariadb
    networks:
      - hypertube-network
    restart: on-failure

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    env_file: .env
    volumes:
      - ./mariadb/data:/var/lib/mysql
    networks:
      - hypertube-network
    restart: on-failure

networks:
  hypertube-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"

volumes:
  subtitle_data: